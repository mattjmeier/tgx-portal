flows:
  # Flow stubs: can be imported/applied via snapshot, or recreated manually in Directus UI.
  - id: d3d1ed60-8606-45c1-982a-d0abbde070fe
    name: "Project Created → Plane Sync"
    icon: sync
    color: "#2ECDA7"
    status: active
    trigger: event
    accountability: null
    options:
      type: items.create
      collection: projects
  - id: 6c52eec9-5944-4dda-8016-8c0d918f7465
    name: "Project Intake Ready → Plane Sync"
    icon: sync
    color: "#2ECDA7"
    status: active
    trigger: event
    accountability: null
    options:
      type: items.update
      collection: projects

operations:
  # These operations assume a Directus endpoint extension at /plane-sync/sync.
  - id: 64ca626c-fbb5-4c13-a624-4b4bd65bdb25
    name: "Call Plane Sync (created)"
    key: webhook
    type: webhook
    position_x: 19
    position_y: 19
    flow: d3d1ed60-8606-45c1-982a-d0abbde070fe
    options:
      method: POST
      url: "{{env.PUBLIC_URL}}/plane-sync/sync"
      headers:
        - { header: Content-Type, value: application/json }
        - { header: Authorization, value: "Bearer {{env.DIRECTUS_AUTOMATION_TOKEN}}" }
      body: "{\"project_id\":\"{{$trigger.key}}\",\"event\":\"created\"}"
  - id: 3754ed8b-3e7c-41fd-906d-d91b03fe6704
    name: "Call Plane Sync (intake_ready)"
    key: webhook
    type: webhook
    position_x: 19
    position_y: 19
    flow: 6c52eec9-5944-4dda-8016-8c0d918f7465
    options:
      method: POST
      url: "{{env.PUBLIC_URL}}/plane-sync/sync"
      headers:
        - { header: Content-Type, value: application/json }
        - { header: Authorization, value: "Bearer {{env.DIRECTUS_AUTOMATION_TOKEN}}" }
      body: "{\"project_id\":\"{{$trigger.key}}\",\"event\":\"intake_ready\"}"
