version: 1

# BLUEPRINT ONLY (STORY-003)
# This file documents the intended Directus collections/fields/relations + RBAC
# + automation building blocks for Admin Lookup and Permissions Management.
#
# It was not exported from a running Directus instance, so it must not be treated
# as an authoritative migration artifact.
#
# Recommended bootstrap path (fresh local stack):
# - `python3 directus/bootstrap/bootstrap_story_001.py`
# - `python3 directus/bootstrap/bootstrap_story_002.py`
# - `python3 directus/bootstrap/bootstrap_story_003.py`
# - export a real snapshot from the running Directus instance for replay.

collections:
  - collection: projects
    meta:
      icon: assignment
      note: Collaborator-facing project intake and lifecycle.
      display_template: "{{title}}"
      accountability: all
      sort: 10
      group: null
      hidden: false
      singleton: false
      archive_field: status
      archive_value: archived
      unarchive_value: draft
      sort_field: updated_at
  - collection: studies
    meta:
      icon: science
      note: Study definitions scoped to a project.
      display_template: "{{species}} {{celltype}}"
      accountability: all
      sort: 20
      hidden: false
      singleton: false
  - collection: samples
    meta:
      icon: biotech
      note: Samples scoped to a study.
      display_template: "{{sample_ID}}"
      accountability: all
      sort: 30
      hidden: false
      singleton: false
  - collection: assays
    meta:
      icon: analytics
      note: Assays scoped to a sample (platform, genome, quantification).
      display_template: "{{platform}}"
      accountability: all
      sort: 40
      hidden: false
      singleton: false
  - collection: sample_plating
    meta:
      icon: grid_on
      note: Optional plating metadata per sample.
      display_template: "Plate {{plate_number}} {{plate_well}}"
      accountability: all
      sort: 50
      hidden: false
      singleton: false

  - collection: sample_intake_uploads
    meta:
      icon: upload_file
      note: Bioinformatician workflow for CSV/TSV preview, validation, and commit into samples/assays.
      display_template: "Intake {{status}}"
      accountability: all
      sort: 60
      group: Workflows
      hidden: false
      singleton: false

  # Lookup collections (admin-managed)
  - collection: platform_options
    meta:
      icon: list
      note: Supported assay platforms (e.g., TempO-Seq, RNA-Seq).
      display_template: "{{name}}"
      accountability: all
      sort: 110
      group: Lookups
      hidden: false
      singleton: false
  - collection: genome_versions
    meta:
      icon: list
      note: Genome / annotation bundle choices.
      display_template: "{{name}}"
      accountability: all
      sort: 120
      group: Lookups
      hidden: false
      singleton: false
  - collection: quantification_methods
    meta:
      icon: list
      note: Quantification methods (lookup).
      display_template: "{{name}}"
      accountability: all
      sort: 130
      group: Lookups
      hidden: false
      singleton: false
  - collection: species_options
    meta:
      icon: list
      note: Species lookup.
      display_template: "{{name}}"
      accountability: all
      sort: 140
      group: Lookups
      hidden: false
      singleton: false
  - collection: biospyder_databases
    meta:
      icon: list
      note: TempO-Seq Biospyder database selections.
      display_template: "{{name}}"
      accountability: all
      sort: 150
      group: Lookups
      hidden: false
      singleton: false
  - collection: biospyder_manifests
    meta:
      icon: list
      note: TempO-Seq Biospyder manifest selections.
      display_template: "{{name}}"
      accountability: all
      sort: 160
      group: Lookups
      hidden: false
      singleton: false

  # Junction (m2m) collections
  - collection: projects_biospyder_databases
    meta:
      icon: link
      note: Junction table for projects ↔ biospyder_databases.
      accountability: all
      hidden: true

fields:
  # projects
  - collection: projects
    field: id
    type: uuid
    schema: { is_primary_key: true, is_nullable: false }
    meta: { hidden: true }
  - collection: projects
    field: title
    type: string
    schema: { is_nullable: false, max_length: 255 }
    meta:
      interface: input
      required: true
      note: Public project title used for reporting and integrations.
  - collection: projects
    field: pi_name
    type: string
    schema: { is_nullable: false, max_length: 255 }
    meta:
      interface: input
      required: true
      note: Principal investigator name (used for Plane workspace mapping).
  - collection: projects
    field: researcher_name
    type: string
    schema: { is_nullable: false, max_length: 255 }
    meta:
      interface: input
      required: true
      note: Primary researcher / point of contact.
  - collection: projects
    field: description
    type: text
    schema: { is_nullable: true }
    meta:
      interface: input-multiline
      required: false
  - collection: projects
    field: status
    type: string
    schema: { is_nullable: false, max_length: 50, default_value: draft }
    meta:
      interface: select-dropdown
      required: true
      options:
        choices:
          - { text: Draft, value: draft }
          - { text: Submitted, value: submitted }
          - { text: Intake Ready, value: intake_ready }
          - { text: Active, value: active }
          - { text: Archived, value: archived }
  - collection: projects
    field: intake_platform
    type: string
    schema: { is_nullable: false, max_length: 50 }
    meta:
      interface: select-dropdown
      required: true
      note: Drives intake-specific conditional fields.
      options:
        choices:
          - { text: TempO-Seq, value: TempO-Seq }
          - { text: RNA-Seq, value: RNA-Seq }
          - { text: Other, value: Other }
  - collection: projects
    field: client_user
    type: uuid
    schema: { is_nullable: false }
    meta:
      interface: select-dropdown-m2o
      required: true
      note: Client scoping anchor (clients can only see their projects).
      special: [m2o]
  - collection: projects
    field: bioinformatician_assigned
    type: uuid
    schema: { is_nullable: true }
    meta:
      interface: select-dropdown-m2o
      required: false
      special: [m2o]
      note: Assigned lab bioinformatician (used for downstream notifications/Plane).
  - collection: projects
    field: biospyder_manifest
    type: uuid
    schema: { is_nullable: true }
    meta:
      interface: select-dropdown-m2o
      required: false
      special: [m2o]
      note: Required for TempO-Seq projects.
      conditions:
        - name: Hide unless TempO-Seq
          rule:
            _and:
              - intake_platform: { _neq: TempO-Seq }
          hidden: true
  - collection: projects
    field: biospyder_databases
    type: alias
    meta:
      interface: list-m2m
      special: [m2m]
      required: false
      note: Required for TempO-Seq projects.
      options:
        junctionCollection: projects_biospyder_databases
        junctionField: projects_id
        relatedCollection: biospyder_databases
        relatedField: biospyder_databases_id
      conditions:
        - name: Hide unless TempO-Seq
          rule:
            _and:
              - intake_platform: { _neq: TempO-Seq }
          hidden: true
  - collection: projects
    field: plane_sync_status
    type: string
    schema: { is_nullable: true, max_length: 50 }
    meta:
      interface: select-dropdown
      required: false
      options:
        choices:
          - { text: Pending, value: pending }
          - { text: Success, value: success }
          - { text: Failed, value: failed }
      readonly: true
  - collection: projects
    field: plane_last_error
    type: text
    schema: { is_nullable: true }
    meta: { interface: input-multiline, readonly: true }
  - collection: projects
    field: plane_external_ref
    type: string
    schema: { is_nullable: true, max_length: 255 }
    meta: { interface: input, readonly: true }
  - collection: projects
    field: created_at
    type: timestamp
    schema: { is_nullable: false }
    meta: { special: [date-created], readonly: true, interface: datetime }
  - collection: projects
    field: updated_at
    type: timestamp
    schema: { is_nullable: false }
    meta: { special: [date-updated], readonly: true, interface: datetime }

  # studies
  - collection: studies
    field: id
    type: uuid
    schema: { is_primary_key: true, is_nullable: false }
    meta: { hidden: true }
  - collection: studies
    field: project
    type: uuid
    schema: { is_nullable: false }
    meta: { interface: select-dropdown-m2o, required: true, special: [m2o] }
  - collection: studies
    field: species
    type: uuid
    schema: { is_nullable: true }
    meta: { interface: select-dropdown-m2o, special: [m2o] }
  - collection: studies
    field: celltype
    type: string
    schema: { is_nullable: true, max_length: 255 }
    meta: { interface: input }
  - collection: studies
    field: treatment_var
    type: string
    schema: { is_nullable: true, max_length: 255 }
    meta: { interface: input }
  - collection: studies
    field: batch_var
    type: string
    schema: { is_nullable: true, max_length: 255 }
    meta: { interface: input }
  - collection: studies
    field: units
    type: string
    schema: { is_nullable: true, max_length: 64 }
    meta: { interface: input }

  # samples
  - collection: samples
    field: id
    type: uuid
    schema: { is_primary_key: true, is_nullable: false }
    meta: { hidden: true }
  - collection: samples
    field: study
    type: uuid
    schema: { is_nullable: false }
    meta: { interface: select-dropdown-m2o, required: true, special: [m2o] }
  - collection: samples
    field: sample_ID
    type: string
    schema: { is_nullable: false, max_length: 128 }
    meta:
      interface: input
      required: true
      note: Must match ^[a-zA-Z0-9-_]*$ (enforced by validation layer).
  - collection: samples
    field: sample_name
    type: string
    schema: { is_nullable: true, max_length: 255 }
    meta: { interface: input }
  - collection: samples
    field: description
    type: text
    schema: { is_nullable: true }
    meta: { interface: input-multiline }
  - collection: samples
    field: group
    type: string
    schema: { is_nullable: true, max_length: 255 }
    meta: { interface: input }
  - collection: samples
    field: chemical
    type: string
    schema: { is_nullable: true, max_length: 255 }
    meta: { interface: input }
  - collection: samples
    field: chemical_longname
    type: string
    schema: { is_nullable: true, max_length: 255 }
    meta: { interface: input }
  - collection: samples
    field: dose
    type: string
    schema: { is_nullable: true, max_length: 255 }
    meta: { interface: input }
  - collection: samples
    field: technical_control
    type: boolean
    schema: { is_nullable: true }
    meta: { interface: boolean }
  - collection: samples
    field: reference_rna
    type: boolean
    schema: { is_nullable: true }
    meta: { interface: boolean }
  - collection: samples
    field: solvent_control
    type: boolean
    schema: { is_nullable: true }
    meta: { interface: boolean }

  # assays
  - collection: assays
    field: id
    type: uuid
    schema: { is_primary_key: true, is_nullable: false }
    meta: { hidden: true }
  - collection: assays
    field: sample
    type: uuid
    schema: { is_nullable: false }
    meta: { interface: select-dropdown-m2o, required: true, special: [m2o] }
  - collection: assays
    field: platform
    type: uuid
    schema: { is_nullable: true }
    meta: { interface: select-dropdown-m2o, special: [m2o] }
  - collection: assays
    field: genome_version
    type: uuid
    schema: { is_nullable: true }
    meta: { interface: select-dropdown-m2o, special: [m2o] }
  - collection: assays
    field: quantification_method
    type: uuid
    schema: { is_nullable: true }
    meta: { interface: select-dropdown-m2o, special: [m2o] }
  - collection: assays
    field: read_mode
    type: string
    schema: { is_nullable: true, max_length: 10 }
    meta:
      interface: select-dropdown
      options:
        choices:
          - { text: Single-end, value: se }
          - { text: Paired-end, value: pe }

  # sample_plating
  - collection: sample_plating
    field: id
    type: uuid
    schema: { is_primary_key: true, is_nullable: false }
    meta: { hidden: true }
  - collection: sample_plating
    field: sample
    type: uuid
    schema: { is_nullable: false }
    meta: { interface: select-dropdown-m2o, required: true, special: [m2o] }
  - collection: sample_plating
    field: plate_number
    type: integer
    schema: { is_nullable: true }
    meta: { interface: input }
  - collection: sample_plating
    field: batch
    type: string
    schema: { is_nullable: true, max_length: 64 }
    meta: { interface: input }
  - collection: sample_plating
    field: plate_well
    type: string
    schema: { is_nullable: true, max_length: 8 }
    meta: { interface: input }
  - collection: sample_plating
    field: row
    type: string
    schema: { is_nullable: true, max_length: 2 }
    meta: { interface: input }
  - collection: sample_plating
    field: column
    type: integer
    schema: { is_nullable: true }
    meta: { interface: input }
  - collection: sample_plating
    field: index_I7
    type: string
    schema: { is_nullable: true, max_length: 64 }
    meta: { interface: input }
  - collection: sample_plating
    field: I7_Index_ID
    type: string
    schema: { is_nullable: true, max_length: 64 }
    meta: { interface: input }
  - collection: sample_plating
    field: index2
    type: string
    schema: { is_nullable: true, max_length: 64 }
    meta: { interface: input }
  - collection: sample_plating
    field: I5_Index_ID
    type: string
    schema: { is_nullable: true, max_length: 64 }
    meta: { interface: input }

  # sample_intake_uploads
  - collection: sample_intake_uploads
    field: id
    type: uuid
    schema: { is_primary_key: true, is_nullable: false }
    meta: { hidden: true }
  - collection: sample_intake_uploads
    field: study
    type: uuid
    schema: { is_nullable: false }
    meta: { interface: select-dropdown-m2o, required: true, special: [m2o] }
  - collection: sample_intake_uploads
    field: file_type
    type: string
    schema: { is_nullable: false, max_length: 10, default_value: tsv }
    meta:
      interface: select-dropdown
      required: true
      options:
        choices:
          - { text: TSV, value: tsv }
          - { text: CSV, value: csv }
  - collection: sample_intake_uploads
    field: source_type
    type: string
    schema: { is_nullable: false, max_length: 10, default_value: text }
    meta:
      interface: select-dropdown
      required: true
      options:
        choices:
          - { text: Paste, value: text }
          - { text: File, value: file }
  - collection: sample_intake_uploads
    field: source_text
    type: text
    schema: { is_nullable: true }
    meta:
      interface: input-multiline
      note: Paste CSV/TSV content here when source_type is Paste.
      options: { softLength: 2000 }
  - collection: sample_intake_uploads
    field: source_file
    type: uuid
    schema: { is_nullable: true }
    meta:
      interface: select-dropdown-m2o
      note: Upload a file in Directus Files first, then select it here when source_type is File.
      special: [m2o]
  - collection: sample_intake_uploads
    field: status
    type: string
    schema: { is_nullable: false, max_length: 20, default_value: draft }
    meta:
      interface: select-dropdown
      required: true
      options:
        choices:
          - { text: Draft, value: draft }
          - { text: Validated, value: validated }
          - { text: Invalid, value: invalid }
          - { text: Committed, value: committed }
          - { text: Commit Failed, value: commit_failed }
  - collection: sample_intake_uploads
    field: validate_requested
    type: boolean
    schema: { is_nullable: false, default_value: false }
    meta:
      interface: boolean
      note: Toggle on and save to force revalidation (will be reset automatically).
  - collection: sample_intake_uploads
    field: commit_requested
    type: boolean
    schema: { is_nullable: false, default_value: false }
    meta:
      interface: boolean
      note: Toggle on and save to commit validated rows into samples/assays (will be reset automatically).
  - collection: sample_intake_uploads
    field: row_count
    type: integer
    schema: { is_nullable: true }
    meta: { interface: input, readonly: true }
  - collection: sample_intake_uploads
    field: valid_row_count
    type: integer
    schema: { is_nullable: true }
    meta: { interface: input, readonly: true }
  - collection: sample_intake_uploads
    field: invalid_row_count
    type: integer
    schema: { is_nullable: true }
    meta: { interface: input, readonly: true }
  - collection: sample_intake_uploads
    field: preview_rows
    type: json
    schema: { is_nullable: true }
    meta:
      interface: input-code
      options: { language: json }
      note: First rows parsed from the uploaded content (for preview).
  - collection: sample_intake_uploads
    field: validation_errors
    type: json
    schema: { is_nullable: true }
    meta:
      interface: input-code
      options: { language: json }
      note: Row-level and field-level validation errors.
  - collection: sample_intake_uploads
    field: validation_summary
    type: json
    schema: { is_nullable: true }
    meta:
      interface: input-code
      options: { language: json }
      note: Validation summary including create/update counts.
  - collection: sample_intake_uploads
    field: validated_hash
    type: string
    schema: { is_nullable: true, max_length: 128 }
    meta: { hidden: true }
  - collection: sample_intake_uploads
    field: validated_at
    type: timestamp
    schema: { is_nullable: true }
    meta: { interface: datetime, readonly: true }
  - collection: sample_intake_uploads
    field: commit_result
    type: json
    schema: { is_nullable: true }
    meta:
      interface: input-code
      options: { language: json }
      note: Commit summary and per-row outcome.
  - collection: sample_intake_uploads
    field: committed_at
    type: timestamp
    schema: { is_nullable: true }
    meta: { interface: datetime, readonly: true }

  # lookups (simple: id + name + code)
  - collection: platform_options
    field: id
    type: uuid
    schema: { is_primary_key: true, is_nullable: false }
    meta: { hidden: true }
  - collection: platform_options
    field: name
    type: string
    schema: { is_nullable: false, max_length: 255 }
    meta: { interface: input, required: true }
  - collection: platform_options
    field: code
    type: string
    schema: { is_nullable: false, max_length: 64, is_unique: true }
    meta: { interface: input, required: true }

  - collection: genome_versions
    field: id
    type: uuid
    schema: { is_primary_key: true, is_nullable: false }
    meta: { hidden: true }
  - collection: genome_versions
    field: name
    type: string
    schema: { is_nullable: false, max_length: 255 }
    meta: { interface: input, required: true }
  - collection: genome_versions
    field: code
    type: string
    schema: { is_nullable: false, max_length: 64, is_unique: true }
    meta: { interface: input, required: true }

  - collection: quantification_methods
    field: id
    type: uuid
    schema: { is_primary_key: true, is_nullable: false }
    meta: { hidden: true }
  - collection: quantification_methods
    field: name
    type: string
    schema: { is_nullable: false, max_length: 255 }
    meta: { interface: input, required: true }
  - collection: quantification_methods
    field: code
    type: string
    schema: { is_nullable: false, max_length: 64, is_unique: true }
    meta: { interface: input, required: true }

  - collection: species_options
    field: id
    type: uuid
    schema: { is_primary_key: true, is_nullable: false }
    meta: { hidden: true }
  - collection: species_options
    field: name
    type: string
    schema: { is_nullable: false, max_length: 255 }
    meta: { interface: input, required: true }
  - collection: species_options
    field: code
    type: string
    schema: { is_nullable: false, max_length: 64, is_unique: true }
    meta: { interface: input, required: true }

  - collection: biospyder_databases
    field: id
    type: uuid
    schema: { is_primary_key: true, is_nullable: false }
    meta: { hidden: true }
  - collection: biospyder_databases
    field: name
    type: string
    schema: { is_nullable: false, max_length: 255 }
    meta: { interface: input, required: true }
  - collection: biospyder_databases
    field: code
    type: string
    schema: { is_nullable: false, max_length: 64, is_unique: true }
    meta: { interface: input, required: true }

  - collection: biospyder_manifests
    field: id
    type: uuid
    schema: { is_primary_key: true, is_nullable: false }
    meta: { hidden: true }
  - collection: biospyder_manifests
    field: name
    type: string
    schema: { is_nullable: false, max_length: 255 }
    meta: { interface: input, required: true }
  - collection: biospyder_manifests
    field: code
    type: string
    schema: { is_nullable: false, max_length: 64, is_unique: true }
    meta: { interface: input, required: true }

  # projects_biospyder_databases (junction)
  - collection: projects_biospyder_databases
    field: id
    type: uuid
    schema: { is_primary_key: true, is_nullable: false }
    meta: { hidden: true }
  - collection: projects_biospyder_databases
    field: projects_id
    type: uuid
    schema: { is_nullable: false }
    meta: { interface: select-dropdown-m2o, required: true, special: [m2o] }
  - collection: projects_biospyder_databases
    field: biospyder_databases_id
    type: uuid
    schema: { is_nullable: false }
    meta: { interface: select-dropdown-m2o, required: true, special: [m2o] }

relations:
  # core hierarchy
  - collection: studies
    field: project
    related_collection: projects
    meta: { many_collection: studies, many_field: project, one_collection: projects, one_field: studies }
    schema: { on_delete: CASCADE }
  - collection: samples
    field: study
    related_collection: studies
    meta: { many_collection: samples, many_field: study, one_collection: studies, one_field: samples }
    schema: { on_delete: CASCADE }
  - collection: assays
    field: sample
    related_collection: samples
    meta: { many_collection: assays, many_field: sample, one_collection: samples, one_field: assays }
    schema: { on_delete: CASCADE }
  - collection: sample_plating
    field: sample
    related_collection: samples
    meta: { many_collection: sample_plating, many_field: sample, one_collection: samples, one_field: plating }
    schema: { on_delete: CASCADE }
  - collection: sample_intake_uploads
    field: study
    related_collection: studies
    meta: { many_collection: sample_intake_uploads, many_field: study, one_collection: studies, one_field: sample_intake_uploads }
    schema: { on_delete: CASCADE }
  - collection: sample_intake_uploads
    field: source_file
    related_collection: directus_files
    meta: { many_collection: sample_intake_uploads, many_field: source_file, one_collection: directus_files, one_field: sample_intake_uploads }
    schema: { on_delete: SET NULL }

  # project scoping + assignments
  - collection: projects
    field: client_user
    related_collection: directus_users
    meta: { many_collection: projects, many_field: client_user, one_collection: directus_users, one_field: client_projects }
    schema: { on_delete: RESTRICT }
  - collection: projects
    field: bioinformatician_assigned
    related_collection: directus_users
    meta: { many_collection: projects, many_field: bioinformatician_assigned, one_collection: directus_users, one_field: assigned_projects }
    schema: { on_delete: SET NULL }

  # lookups
  - collection: studies
    field: species
    related_collection: species_options
    meta: { many_collection: studies, many_field: species, one_collection: species_options, one_field: studies }
    schema: { on_delete: SET NULL }
  - collection: assays
    field: platform
    related_collection: platform_options
    meta: { many_collection: assays, many_field: platform, one_collection: platform_options, one_field: assays }
    schema: { on_delete: SET NULL }
  - collection: assays
    field: genome_version
    related_collection: genome_versions
