name: plane-stack

x-plane-app-env: &plane-app-env
  API_BASE_URL: ${API_BASE_URL:-http://plane-api:8000}
  LIVE_SERVER_SECRET_KEY: ${LIVE_SERVER_SECRET_KEY}
  POSTGRES_USER: ${PLANE_POSTGRES_USER:-plane}
  POSTGRES_PASSWORD: ${PLANE_POSTGRES_PASSWORD:-plane}
  POSTGRES_DB: ${PLANE_POSTGRES_DB:-plane}
  DATABASE_URL: ${DATABASE_URL}
  REDIS_HOST: plane-redis
  REDIS_PORT: "6379"
  REDIS_URL: ${REDIS_URL}
  RABBITMQ_HOST: plane-mq
  RABBITMQ_PORT: "5672"
  RABBITMQ_USER: ${PLANE_RABBITMQ_USER:-plane}
  RABBITMQ_PASSWORD: ${PLANE_RABBITMQ_PASSWORD:-plane}
  RABBITMQ_VHOST: ${PLANE_RABBITMQ_VHOST:-plane}
  AWS_REGION: ${PLANE_AWS_REGION:-}
  AWS_ACCESS_KEY_ID: ${PLANE_AWS_ACCESS_KEY_ID:-access-key}
  AWS_SECRET_ACCESS_KEY: ${PLANE_AWS_SECRET_ACCESS_KEY:-secret-key}
  AWS_S3_ENDPOINT_URL: http://plane-minio:9000
  AWS_S3_BUCKET_NAME: ${PLANE_AWS_S3_BUCKET_NAME:-uploads}
  FILE_SIZE_LIMIT: ${PLANE_FILE_SIZE_LIMIT:-5242880}
  USE_MINIO: "1"
  TRUSTED_PROXIES: ${PLANE_TRUSTED_PROXIES:-0.0.0.0/0}
  SITE_ADDRESS: ${PLANE_SITE_ADDRESS:-:80}
  CERT_ACME_CA: ${PLANE_CERT_ACME_CA:-https://acme-v02.api.letsencrypt.org/directory}
  CERT_EMAIL: ${PLANE_CERT_EMAIL:-}
  CERT_ACME_DNS: ${PLANE_CERT_ACME_DNS:-}
  MINIO_ENDPOINT_SSL: ${PLANE_MINIO_ENDPOINT_SSL:-0}
  API_KEY_RATE_LIMIT: ${PLANE_API_KEY_RATE_LIMIT:-60/minute}

x-plane-db-env: &plane-db-env
  POSTGRES_USER: ${PLANE_POSTGRES_USER:-plane}
  POSTGRES_PASSWORD: ${PLANE_POSTGRES_PASSWORD:-plane}
  POSTGRES_DB: ${PLANE_POSTGRES_DB:-plane}
  PGDATA: /var/lib/postgresql/data

x-plane-mq-env: &plane-mq-env
  RABBITMQ_DEFAULT_USER: ${PLANE_RABBITMQ_USER:-plane}
  RABBITMQ_DEFAULT_PASS: ${PLANE_RABBITMQ_PASSWORD:-plane}
  RABBITMQ_DEFAULT_VHOST: ${PLANE_RABBITMQ_VHOST:-plane}

x-plane-minio-env: &plane-minio-env
  MINIO_ROOT_USER: ${PLANE_AWS_ACCESS_KEY_ID:-access-key}
  MINIO_ROOT_PASSWORD: ${PLANE_AWS_SECRET_ACCESS_KEY:-secret-key}

services:
  plane-db:
    image: postgres:15.7-alpine
    container_name: plane-db
    restart: unless-stopped
    command: postgres -c "max_connections=1000"
    environment:
      <<: *plane-db-env
    volumes:
      - plane_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PLANE_POSTGRES_USER:-plane} -d ${PLANE_POSTGRES_DB:-plane}"]
      interval: 10s
      timeout: 5s
      retries: 5

  plane-redis:
    image: valkey/valkey:7.2.11-alpine
    container_name: plane-redis
    restart: unless-stopped
    volumes:
      - plane_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  plane-mq:
    image: rabbitmq:3.13.6-management-alpine
    container_name: plane-mq
    restart: unless-stopped
    environment:
      <<: *plane-mq-env
    volumes:
      - plane_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 10

  plane-minio:
    image: minio/minio
    container_name: plane-minio
    restart: unless-stopped
    command: server /export --console-address ":9090"
    environment:
      <<: *plane-minio-env
    volumes:
      - plane_uploads:/export

  plane-api:
    image: makeplane/plane-backend:stable
    container_name: plane-api
    restart: unless-stopped
    command: ./bin/docker-entrypoint-api.sh
    environment:
      <<: *plane-app-env
    depends_on:
      plane-migrator:
        condition: service_completed_successfully
      plane-db:
        condition: service_healthy
      plane-redis:
        condition: service_healthy
      plane-mq:
        condition: service_healthy
      plane-minio:
        condition: service_started

  plane-worker:
    image: makeplane/plane-backend:stable
    container_name: plane-worker
    restart: unless-stopped
    command: ./bin/docker-entrypoint-worker.sh
    environment:
      <<: *plane-app-env
    depends_on:
      plane-api:
        condition: service_started
      plane-db:
        condition: service_healthy
      plane-redis:
        condition: service_healthy
      plane-mq:
        condition: service_healthy
      plane-minio:
        condition: service_started

  plane-beat:
    image: makeplane/plane-backend:stable
    container_name: plane-beat
    restart: unless-stopped
    command: ./bin/docker-entrypoint-beat.sh
    environment:
      <<: *plane-app-env
    depends_on:
      plane-api:
        condition: service_started
      plane-db:
        condition: service_healthy
      plane-redis:
        condition: service_healthy
      plane-mq:
        condition: service_healthy
      plane-minio:
        condition: service_started

  plane-migrator:
    image: makeplane/plane-backend:stable
    container_name: plane-migrator
    restart: "no"
    command: ./bin/docker-entrypoint-migrator.sh
    environment:
      <<: *plane-app-env
    depends_on:
      plane-db:
        condition: service_healthy
      plane-redis:
        condition: service_healthy
      plane-mq:
        condition: service_healthy
      plane-minio:
        condition: service_started

  plane-live:
    image: makeplane/plane-live:stable
    container_name: plane-live
    restart: unless-stopped
    environment:
      <<: *plane-app-env
    depends_on:
      plane-api:
        condition: service_started
      plane-minio:
        condition: service_started

  plane-web:
    image: makeplane/plane-frontend:stable
    container_name: plane-web
    restart: unless-stopped
    environment:
      <<: *plane-app-env
    depends_on:
      plane-api:
        condition: service_started
      plane-minio:
        condition: service_started

  plane-admin:
    image: makeplane/plane-admin:stable
    container_name: plane-admin
    restart: unless-stopped
    environment:
      <<: *plane-app-env
    depends_on:
      plane-api:
        condition: service_started
      plane-web:
        condition: service_started
      plane-minio:
        condition: service_started

  plane-space:
    image: makeplane/plane-space:stable
    container_name: plane-space
    restart: unless-stopped
    environment:
      <<: *plane-app-env
    depends_on:
      plane-api:
        condition: service_started
      plane-web:
        condition: service_started
      plane-minio:
        condition: service_started

  plane-proxy:
    image: makeplane/plane-proxy:stable
    container_name: plane-proxy
    restart: unless-stopped
    ports:
      - "${PLANE_HTTP_PORT:-8088}:80"
      - "${PLANE_HTTPS_PORT:-8443}:443"
    environment:
      <<: *plane-app-env
    depends_on:
      plane-web:
        condition: service_started
      plane-admin:
        condition: service_started
      plane-space:
        condition: service_started
      plane-live:
        condition: service_started
      plane-api:
        condition: service_started
      plane-minio:
        condition: service_started

volumes:
  plane_pgdata:
  plane_redisdata:
  plane_rabbitmq_data:
  plane_uploads:
